backend:
  name: git-gateway
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

locale: 'ko'

collections:
  - name: "main"
    label: "🏠 메인 페이지"
    files:
      - label: "메인 페이지 설정"
        name: "main"
        file: "content/main.json"
        fields:
          - { label: "메인 태그라인", name: "tagline", widget: "string" }
          - { label: "메인 부제목", name: "subtitle", widget: "text" }
          - { label: "메인 배경 이미지", name: "hero_image", widget: "image", required: false }

  - name: "company"
    label: "🏢 회사소개"
    files:
      - label: "인사말"
        name: "greeting"
        file: "content/greeting.json"
        fields:
          - { label: "대표이사 사진", name: "ceo_image", widget: "image", required: false }
          - { label: "대표 인사말 제목", name: "quote", widget: "string" }
          - { label: "인사말 내용 1", name: "content1", widget: "text" }
          - { label: "인사말 내용 2", name: "content2", widget: "text" }
      - label: "주요인증서현황"
        name: "certifications"
        file: "content/certifications.json"
        fields:
          - label: "인증서 목록"
            name: "items"
            widget: "list"
            fields:
              - { label: "인증명", name: "title", widget: "string" }
              - { label: "설명", name: "desc", widget: "text" }
              - { label: "인증서 이미지", name: "image", widget: "image", required: false }
      - label: "연혁"
        name: "history"
        file: "content/history.json"
        fields:
          - label: "연혁 목록"
            name: "items"
            widget: "list"
            fields:
              - { label: "연도", name: "year", widget: "string" }
              - { label: "월", name: "month", widget: "string" }
              - { label: "내용", name: "content", widget: "string" }

  - name: "products"
    label: "🔧 제품 관리"
    files:
      - label: "철도차량 부품"
        name: "rail"
        file: "content/product-rail.json"
        fields:
          - { label: "소개 문구", name: "intro", widget: "text" }
          - { label: "이미지 1", name: "image1", widget: "image", required: false }
          - { label: "이미지 2", name: "image2", widget: "image", required: false }
          - { label: "이미지 3", name: "image3", widget: "image", required: false }
          - label: "제품 항목"
            name: "items"
            widget: "list"
            fields:
              - { label: "제품명", name: "title", widget: "string" }
              - { label: "설명", name: "desc", widget: "text" }
              - { label: "이미지", name: "image", widget: "image", required: false }
      - label: "방산 부품"
        name: "defense"
        file: "content/product-defense.json"
        fields:
          - { label: "소개 문구", name: "intro", widget: "text" }
          - { label: "이미지 1", name: "image1", widget: "image", required: false }
          - { label: "이미지 2", name: "image2", widget: "image", required: false }
          - label: "제품 항목"
            name: "items"
            widget: "list"
            fields:
              - { label: "제품명", name: "title", widget: "string" }
              - { label: "설명", name: "desc", widget: "text" }
              - { label: "이미지", name: "image", widget: "image", required: false }
      - label: "산업플랜트"
        name: "plant"
        file: "content/product-plant.json"
        fields:
          - { label: "소개 문구", name: "intro", widget: "text" }
          - { label: "이미지 1", name: "image1", widget: "image", required: false }
          - { label: "이미지 2", name: "image2", widget: "image", required: false }
          - label: "제품 항목"
            name: "items"
            widget: "list"
            fields:
              - { label: "제품명", name: "title", widget: "string" }
              - { label: "설명", name: "desc", widget: "text" }
              - { label: "이미지", name: "image", widget: "image", required: false }

  - name: "equipment_mgmt"
    label: "⚙️ 장비 관리"
    files:
      - label: "프레스"
        name: "press"
        file: "content/equipment-press.json"
        fields:
          - { label: "소개 문구", name: "intro", widget: "text" }
          - { label: "장비 이미지 1", name: "image1", widget: "image", required: false }
          - { label: "장비 이미지 2", name: "image2", widget: "image", required: false }
          - label: "장비 스펙"
            name: "specs"
            widget: "list"
            fields:
              - { label: "항목", name: "label", widget: "string" }
              - { label: "내용", name: "value", widget: "string" }
      - label: "레이저"
        name: "laser"
        file: "content/equipment-laser.json"
        fields:
          - { label: "소개 문구", name: "intro", widget: "text" }
          - { label: "장비 이미지 1", name: "image1", widget: "image", required: false }
          - { label: "장비 이미지 2", name: "image2", widget: "image", required: false }
      - label: "용접 및 기타장비"
        name: "welding"
        file: "content/equipment-welding.json"
        fields:
          - { label: "소개 문구", name: "intro", widget: "text" }
          - { label: "장비 이미지 1", name: "image1", widget: "image", required: false }
          - { label: "장비 이미지 2", name: "image2", widget: "image", required: false }

  - name: "sustainability"
    label: "🌿 지속가능경영"
    files:
      - label: "안전/보건경영"
        name: "safety"
        file: "content/safety.json"
        fields:
          - { label: "소개 문구", name: "intro", widget: "text" }
          - { label: "대표 이미지", name: "image", widget: "image", required: false }
      - label: "환경경영"
        name: "environment"
        file: "content/environment.json"
        fields:
          - { label: "에너지관리 소개", name: "energy_intro", widget: "text" }
          - { label: "에너지관리 이미지", name: "energy_image", widget: "image", required: false }
          - { label: "온실가스 소개", name: "gas_intro", widget: "text" }
          - { label: "온실가스 이미지", name: "gas_image", widget: "image", required: false }
          - { label: "폐기물관리 소개", name: "waste_intro", widget: "text" }
          - { label: "폐기물관리 이미지", name: "waste_image", widget: "image", required: false }

  - name: "recruit"
    label: "👥 인재채용"
    files:
      - label: "채용 정보"
        name: "recruit"
        file: "content/recruit.json"
        fields:
          - { label: "인사제도 이미지", name: "image1", widget: "image", required: false }
          - { label: "인재상 이미지", name: "image2", widget: "image", required: false }
          - { label: "복리후생 내용", name: "benefits", widget: "text" }
          - { label: "지원 방법", name: "apply_info", widget: "text" }

  - name: "gallery"
    label: "📸 사진 갤러리"
    folder: "content/gallery"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "제목", name: "title", widget: "string" }
      - { label: "카테고리", name: "category", widget: "select", options: ["제품", "장비", "회사", "기타"] }
      - { label: "사진", name: "image", widget: "image" }
      - { label: "설명", name: "caption", widget: "string", required: false }
