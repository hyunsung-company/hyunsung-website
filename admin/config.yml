backend:
  name: git-gateway
  branch: main

media_folder: "images/uploads"
public_folder: "/images/uploads"

locale: 'ko'

collections:
  - name: "main"
    label: "🏠 메인 페이지"
    files:
      - label: "메인 페이지 설정"
        name: "main"
        file: "content/main.json"
        fields:
          - { label: "태그라인", name: "tagline", widget: "string" }
          - { label: "부제목", name: "subtitle", widget: "text" }

  - name: "slider"
    label: "🖼️ 메인 슬라이드 사진"
    files:
      - label: "슬라이드 사진"
        name: "slides"
        file: "content/slides.json"
        fields:
          - { label: "슬라이드 1", name: "slide1", widget: "image", required: false }
          - { label: "슬라이드 2", name: "slide2", widget: "image", required: false }
          - { label: "슬라이드 3", name: "slide3", widget: "image", required: false }
          - { label: "전환 속도 (초)", name: "interval", widget: "number", default: 3, value_type: "int", min: 2, max: 10 }

  - name: "company"
    label: "🏢 회사소개"
    files:
      - label: "인사말"
        name: "greeting"
        file: "content/greeting.json"
        fields:
          - { label: "대표이사 사진", name: "ceo_image", widget: "image", required: false }
          - { label: "인사말 제목", name: "quote", widget: "string" }
          - { label: "인사말 내용 1", name: "content1", widget: "text" }
          - { label: "인사말 내용 2", name: "content2", widget: "text" }
      - label: "주요인증서현황"
        name: "certifications"
        file: "content/certifications.json"
        fields:
          - label: "인증서 목록"
            name: "items"
            widget: "list"
            fields:
              - { label: "인증명", name: "title", widget: "string" }
              - { label: "설명", name: "desc", widget: "text" }
              - { label: "이미지", name: "image", widget: "image", required: false }
      - label: "연혁"
        name: "history"
        file: "content/history.json"
        fields:
          - label: "연혁 목록"
            name: "items"
            widget: "list"
            fields:
              - { label: "연도", name: "year", widget: "string" }
              - { label: "월", name: "month", widget: "string" }
              - { label: "내용", name: "content", widget: "string" }

  - name: "products"
    label: "🔧 제품 사진 관리"
    files:
      - label: "철도차량 부품 사진"
        name: "rail_photos"
        file: "content/photos-rail.json"
        fields:
          - { label: "소개 문구", name: "intro", widget: "text" }
          - label: "사진 목록 (최대 50장 이상 추가 가능)"
            name: "photos"
            widget: "list"
            fields:
              - { label: "사진", name: "image", widget: "image" }
              - { label: "제품명/설명", name: "caption", widget: "string", required: false }
      - label: "방산 부품 사진"
        name: "defense_photos"
        file: "content/photos-defense.json"
        fields:
          - { label: "소개 문구", name: "intro", widget: "text" }
          - label: "사진 목록 (최대 50장 이상 추가 가능)"
            name: "photos"
            widget: "list"
            fields:
              - { label: "사진", name: "image", widget: "image" }
              - { label: "제품명/설명", name: "caption", widget: "string", required: false }
      - label: "산업플랜트 사진"
        name: "plant_photos"
        file: "content/photos-plant.json"
        fields:
          - { label: "소개 문구", name: "intro", widget: "text" }
          - label: "사진 목록 (최대 50장 이상 추가 가능)"
            name: "photos"
            widget: "list"
            fields:
              - { label: "사진", name: "image", widget: "image" }
              - { label: "제품명/설명", name: "caption", widget: "string", required: false }

  - name: "equipment_photos"
    label: "⚙️ 장비 사진 관리"
    files:
      - label: "프레스 사진"
        name: "press_photos"
        file: "content/photos-press.json"
        fields:
          - { label: "소개 문구", name: "intro", widget: "text" }
          - label: "사진 목록 (최대 50장 이상 추가 가능)"
            name: "photos"
            widget: "list"
            fields:
              - { label: "사진", name: "image", widget: "image" }
              - { label: "장비명/설명", name: "caption", widget: "string", required: false }
      - label: "레이저 사진"
        name: "laser_photos"
        file: "content/photos-laser.json"
        fields:
          - { label: "소개 문구", name: "intro", widget: "text" }
          - label: "사진 목록 (최대 50장 이상 추가 가능)"
            name: "photos"
            widget: "list"
            fields:
              - { label: "사진", name: "image", widget: "image" }
              - { label: "장비명/설명", name: "caption", widget: "string", required: false }
      - label: "용접 및 기타장비 사진"
        name: "welding_photos"
        file: "content/photos-welding.json"
        fields:
          - { label: "소개 문구", name: "intro", widget: "text" }
          - label: "사진 목록 (최대 50장 이상 추가 가능)"
            name: "photos"
            widget: "list"
            fields:
              - { label: "사진", name: "image", widget: "image" }
              - { label: "장비명/설명", name: "caption", widget: "string", required: false }

  - name: "sustainability"
    label: "🌿 지속가능경영"
    files:
      - label: "안전/보건경영"
        name: "safety"
        file: "content/safety.json"
        fields:
          - { label: "소개 문구", name: "intro", widget: "text" }
          - label: "사진 목록"
            name: "photos"
            widget: "list"
            fields:
              - { label: "사진", name: "image", widget: "image" }
              - { label: "설명", name: "caption", widget: "string", required: false }
      - label: "환경경영"
        name: "environment"
        file: "content/environment.json"
        fields:
          - { label: "에너지관리 소개", name: "energy_intro", widget: "text" }
          - { label: "에너지관리 이미지", name: "energy_image", widget: "image", required: false }
          - { label: "온실가스 소개", name: "gas_intro", widget: "text" }
          - { label: "온실가스 이미지", name: "gas_image", widget: "image", required: false }
          - { label: "폐기물관리 소개", name: "waste_intro", widget: "text" }
          - { label: "폐기물관리 이미지", name: "waste_image", widget: "image", required: false }

  - name: "recruit"
    label: "👥 인재채용"
    files:
      - label: "채용 정보"
        name: "recruit"
        file: "content/recruit.json"
        fields:
          - { label: "인사제도 이미지", name: "image1", widget: "image", required: false }
          - { label: "인재상 이미지", name: "image2", widget: "image", required: false }
          - { label: "복리후생 내용", name: "benefits", widget: "text" }
          - { label: "지원 이메일", name: "apply_email", widget: "string", default: "hs@hskiup.co.kr" }
          - { label: "지원 전화", name: "apply_tel", widget: "string", default: "055-345-0082" }

  - name: "orgchart"
    label: "🏛️ 조직구성"
    files:
      - label: "조직도 설명"
        name: "org"
        file: "content/org.json"
        fields:
          - { label: "페이지 부제목", name: "subtitle", widget: "string", default: "고객 가치실현을 목표로 최고의 팀워크와 창의력으로 꾸준하게 노력하는 기업" }
          - label: "부서 목록"
            name: "departments"
            widget: "list"
            fields:
              - { label: "부서명", name: "name", widget: "string" }
              - { label: "상위 부서", name: "parent", widget: "string", required: false }
              - { label: "하위 팀", name: "teams", widget: "string", hint: "쉼표로 구분 (예: 영업, 총무·자재)" }
