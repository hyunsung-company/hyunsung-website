<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>방문 예약 | 현성기업㈜</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap');

  :root{
    --graphite:#1C2226;
    --steel:#3C4B5C;
    --steel-light:#6B7C8E;
    --blue:#2E5C8A;
    --blue-dim:#26496e;
    --paper:#F3F4F2;
    --panel:#FFFFFF;
    --line:#D7DBDD;
    --amber:#C9781F;
    --ok:#2E7D5B;
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper);
    background-image:
      linear-gradient(var(--line) 1px, transparent 1px),
      linear-gradient(90deg, var(--line) 1px, transparent 1px);
    background-size: 28px 28px;
    background-attachment: fixed;
    font-family:'IBM Plex Sans KR', sans-serif;
    color:var(--graphite);
    padding:40px 16px 80px;
    min-height:100vh;
  }

  .sheet{
    max-width:640px;
    margin:0 auto;
    background:var(--panel);
    border:1px solid var(--line);
    position:relative;
    box-shadow: 0 1px 3px rgba(28,34,38,0.06);
  }

  /* 도면 느낌의 코너 레지스트레이션 마크 */
  .sheet::before, .sheet::after,
  .corner-tl, .corner-br{
    content:"";
    position:absolute;
    width:14px; height:14px;
    border-color:var(--steel-light);
    border-style:solid;
    opacity:.6;
  }
  .sheet::before{ top:-1px; left:-1px; border-width:2px 0 0 2px; }
  .sheet::after{ bottom:-1px; right:-1px; border-width:0 2px 2px 0; }

  .head{
    padding:28px 32px 22px;
    border-bottom:1px solid var(--line);
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    gap:16px;
  }
  .head-left .eyebrow{
    font-family:'IBM Plex Mono', monospace;
    font-size:11px;
    letter-spacing:.12em;
    color:var(--steel-light);
    text-transform:uppercase;
    margin:0 0 6px;
  }
  .head-left h1{
    font-size:21px;
    font-weight:700;
    margin:0;
    letter-spacing:-0.01em;
  }
  .head-right{
    font-family:'IBM Plex Mono', monospace;
    font-size:11px;
    color:var(--steel-light);
    text-align:right;
    line-height:1.6;
    white-space:nowrap;
    padding-top:2px;
  }
  .head-right .doc-id{ color:var(--steel); font-weight:600; }

  form{ padding:28px 32px 32px; }

  .section-label{
    font-family:'IBM Plex Mono', monospace;
    font-size:10.5px;
    letter-spacing:.12em;
    color:var(--blue);
    text-transform:uppercase;
    margin:0 0 12px;
    padding-bottom:6px;
    border-bottom:1px solid var(--line);
    display:flex;
    align-items:center;
    gap:8px;
  }
  .section-label:not(:first-child){ margin-top:28px; }

  .grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:16px 14px;
  }
  .field{ display:flex; flex-direction:column; gap:6px; }
  .field.full{ grid-column:1 / -1; }

  label{
    font-size:12.5px;
    font-weight:600;
    color:var(--steel);
  }
  label .req{ color:var(--amber); margin-left:2px; }

  input, select{
    font-family:'IBM Plex Sans KR', sans-serif;
    font-size:14px;
    padding:10px 12px;
    border:1px solid var(--line);
    border-radius:2px;
    background:var(--paper);
    color:var(--graphite);
    outline:none;
    transition:border-color .15s ease, background .15s ease;
    width:100%;
  }
  input:focus, select:focus{
    border-color:var(--blue);
    background:var(--panel);
  }
  input::placeholder{ color:#A8B0B6; }

  .radio-row{
    display:flex;
    gap:10px;
  }
  .radio-card{
    flex:1;
    border:1px solid var(--line);
    border-radius:2px;
    padding:11px 12px;
    cursor:pointer;
    font-size:13px;
    display:flex;
    align-items:center;
    gap:8px;
    background:var(--paper);
    transition:border-color .15s ease, background .15s ease;
  }
  .radio-card input{ width:auto; accent-color:var(--blue); }
  .radio-card:has(input:checked){
    border-color:var(--blue);
    background:#EAF1F8;
  }
  .radio-card.security:has(input:checked){
    border-color:var(--amber);
    background:#FBF1E4;
  }

  .submit-row{
    margin-top:30px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:16px;
  }
  .submit-note{
    font-size:11.5px;
    color:var(--steel-light);
    line-height:1.5;
  }
  button{
    font-family:'IBM Plex Sans KR', sans-serif;
    font-weight:600;
    font-size:14px;
    color:#fff;
    background:var(--blue);
    border:none;
    border-radius:2px;
    padding:13px 26px;
    cursor:pointer;
    white-space:nowrap;
    transition:background .15s ease;
  }
  button:hover{ background:var(--blue-dim); }
  button:disabled{ background:var(--steel-light); cursor:not-allowed; }

  .status{
    margin-top:16px;
    padding:12px 14px;
    border-radius:2px;
    font-size:13px;
    display:none;
    font-family:'IBM Plex Mono', monospace;
  }
  .status.show{ display:block; }
  .status.ok{ background:#E8F3EC; color:var(--ok); border:1px solid #B9DFC7; }
  .status.err{ background:#FBEAEA; color:#B4392E; border:1px solid #F0C1BC; }

  @media (max-width:520px){
    .grid{ grid-template-columns:1fr; }
    .head{ flex-direction:column; }
    .head-right{ text-align:left; }
    .submit-row{ flex-direction:column; align-items:stretch; }
    button{ width:100%; }
  }
</style>
</head>
<body>

<div class="sheet">
  <div class="head">
    <div class="head-left">
      <p class="eyebrow">Hyunsung Enterprise · Visitor Access</p>
      <h1>사업장 방문 예약 신청</h1>
    </div>
    <div class="head-right">
      FORM&nbsp;<span class="doc-id">VR-01</span><br>
      경남 김해시
    </div>
  </div>

  <form id="visitForm">
    <p class="section-label">01 — 방문자 정보</p>
    <div class="grid">
      <div class="field">
        <label>방문자명<span class="req">*</span></label>
        <input type="text" name="visitorName" placeholder="홍길동" required>
      </div>
      <div class="field">
        <label>소속(회사명)<span class="req">*</span></label>
        <input type="text" name="company" placeholder="㈜○○산업" required>
      </div>
      <div class="field">
        <label>연락처<span class="req">*</span></label>
        <input type="tel" name="phone" placeholder="010-0000-0000" required>
      </div>
      <div class="field">
        <label>이메일<span class="req">*</span></label>
        <input type="email" name="email" placeholder="you@company.com" required>
      </div>
    </div>

    <p class="section-label">02 — 방문 일정</p>
    <div class="grid">
      <div class="field">
        <label>방문 희망일<span class="req">*</span></label>
        <input type="date" name="visitDate" required>
      </div>
      <div class="field">
        <label>방문 희망시간<span class="req">*</span></label>
        <input type="time" name="visitTime" required>
      </div>
      <div class="field full">
        <label>방문목적<span class="req">*</span></label>
        <input type="text" name="purpose" placeholder="예: 납품 협의, 시설 견학, 품질 점검 등" required>
      </div>
      <div class="field full">
        <label>담당자 (피방문자)<span class="req">*</span></label>
        <input type="text" name="hostName" placeholder="예: 영업팀 홍길동" required>
      </div>
    </div>

    <p class="section-label">03 — 출입 구분</p>
    <div class="field full">
      <div class="radio-row">
        <label class="radio-card">
          <input type="radio" name="securityArea" value="일반" checked>
          일반 방문
        </label>
        <label class="radio-card security">
          <input type="radio" name="securityArea" value="보안구역">
          보안구역 접근 (생산라인 · 도면열람)
        </label>
      </div>
    </div>

    <div class="submit-row">
      <p class="submit-note">신청 후 정보보안 관리자 승인 절차를<br>거쳐 확정 메일이 발송됩니다.</p>
      <button type="submit" id="submitBtn">예약 신청</button>
    </div>

    <div class="status" id="statusBox"></div>
  </form>
</div>

<script>
// Apps Script 배포 URL을 여기에 붙여넣으세요
const ENDPOINT_URL = "https://script.google.com/macros/s/AKfycbxE0DGSyv8JBgXQ7Ffq9B8ns1Otf9WabB-IbWcwVgNYYk53P2pWUsIbJCmFd7tzi4y2VA/exec";

const form = document.getElementById('visitForm');
const btn = document.getElementById('submitBtn');
const statusBox = document.getElementById('statusBox');

form.addEventListener('submit', async function(e){
  e.preventDefault();
  btn.disabled = true;
  btn.textContent = "전송 중...";
  statusBox.className = "status";

  const formData = new FormData(form);

  try{
    await fetch(ENDPOINT_URL, {
      method: 'POST',
      mode: 'no-cors',
      body: formData
    });
    statusBox.textContent = "접수 완료 — 담당자 승인 후 이메일로 확정 안내드립니다.";
    statusBox.classList.add('show','ok');
    form.reset();
  }catch(err){
    statusBox.textContent = "전송 중 오류가 발생했습니다. 다시 시도해 주세요.";
    statusBox.classList.add('show','err');
  }finally{
    btn.disabled = false;
    btn.textContent = "예약 신청";
  }
});
</script>

</body>
</html>
