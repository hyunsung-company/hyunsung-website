<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>사업장현황 | 현성기업</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  /* 레이아웃 디자인 */
  .content-wrap { max-width: 1200px; margin: 50px auto; padding: 0 20px; font-family: 'Noto Sans KR', sans-serif; }
  .section-title { text-align: center; color: #1a365d; font-size: 32px; margin-bottom: 40px; }
  .sites-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
  .site-box { border: 1px solid #ddd; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
  .site-img { width: 100%; height: 250px; object-fit: cover; background: #eee; }
  .site-info { padding: 20px; }
  .site-info h3 { margin: 0 0 15px 0; color: #1a365d; border-bottom: 2px solid #1a365d; display: inline-block; }
  .info-table { width: 100%; border-collapse: collapse; }
  .info-table th { text-align: left; width: 80px; color: #666; padding: 8px 0; }
  .info-table td { padding: 8px 0; color: #333; }
  @media (max-width: 768px) { .sites-grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<div class="content-wrap">
  <h2 class="section-title">사업장 현황</h2>
  
  <div class="sites-grid">
    <div class="site-box">
      <img src="Gemini_Generated_Image_o2zjixo2zjixo2zj.png" class="site-img" alt="진례공장">
      <div class="site-info">
        <h3>본사 (진례공장)</h3>
        <table class="info-table">
          <tr><th>주소</th><td>경상남도 김해시 진례면 고모로180번길 47-36</td></tr>
          <tr><th>전화</th><td>055-345-0082</td></tr>
          <tr><th>FAX</th><td>055-345-0084</td></tr>
        </table>
      </div>
    </div>

    <div class="site-box">
      <img src="함안전경.png" class="site-img" alt="함안지사">
      <div class="site-info">
        <h3>함안지사</h3>
        <table class="info-table">
          <tr><th>주소</th><td>경상남도 함안군 법수면 법수로 358-16</td></tr>
          <tr><th>전화</th><td>055-345-0082</td></tr>
          <tr><th>FAX</th><td>055-345-0084</td></tr>
        </table>
      </div>
    </div>
  </div>
</div>

</body>
</html>
